name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump admin version
        run: npm run bump:admin-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/public/admin-spa/package.json
          git diff --cached --quiet || (git commit -m "chore: bump admin version [skip ci]" && git push)

      - name: Trigger server deploy
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          curl -sf -X POST https://iftype.store/admin/deploy \
            -H "Authorization: Bearer $ADMIN_SECRET"
