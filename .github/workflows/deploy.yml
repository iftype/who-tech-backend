name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump admin version
        id: bump
        run: |
          npm run bump:admin-version
          echo "version=$(node -p "require('./src/public/admin-spa/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/public/admin-spa/package.json
          git diff --cached --quiet && exit 0
          BRANCH="bump/admin-v${{ steps.bump.outputs.version }}-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "chore: bump admin version to ${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create --title "chore: bump admin version to ${{ steps.bump.outputs.version }}" --body "Auto-generated version bump" --base main)
          gh pr merge "$PR_URL" --squash --auto

      - name: Trigger server deploy
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          curl -sf -X POST https://iftype.store/admin/deploy \
            -H "Authorization: Bearer $ADMIN_SECRET"
