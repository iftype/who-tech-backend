name: Blog Check

on:
  schedule:
    - cron: '0 * * * *' # 매시간
  workflow_dispatch: # 수동 트리거

jobs:
  blog-check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger blog sync
        run: |
          BASE_URL="${{ secrets.SYNC_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://iftype.store"
          fi

          response=$(curl -sf \
            -X POST "$BASE_URL/admin/blog/sync" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "X-Sync-Source: github-actions")
          echo "$response"

          job_id=$(echo "$response" | jq -r '.id // empty')
          if [ -z "$job_id" ]; then
            echo "Blog sync job id missing"
            exit 1
          fi

          for i in $(seq 1 90); do
            job=$(curl -sf \
              "$BASE_URL/admin/blog/sync-jobs/$job_id" \
              -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}")
            status=$(echo "$job" | jq -r '.status')
            message=$(echo "$job" | jq -r '.message // ""')
            percent=$(echo "$job" | jq -r '.progress.percent // 0')
            processed=$(echo "$job" | jq -r '.progress.processed // 0')
            total=$(echo "$job" | jq -r '.progress.total // 0')

            echo "Blog sync status: $status ($percent% $processed/$total) $message"

            if [ "$status" = "completed" ]; then
              echo "$job" > /tmp/blog-sync-job.json
              exit 0
            fi

            if [ "$status" = "failed" ]; then
              echo "$job"
              exit 1
            fi

            sleep 10
          done

          echo "Blog sync timed out while waiting for completion"
          exit 1

      - name: Fetch new blog posts
        id: new_posts
        run: |
          BASE_URL="${{ secrets.SYNC_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://iftype.store"
          fi

          curl -sf \
            "$BASE_URL/admin/blog/new-posts?sinceMinutes=65" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -o /tmp/blog-new-posts.json || echo '[]' > /tmp/blog-new-posts.json

          count=$(jq 'if type == "array" then length else 0 end' /tmp/blog-new-posts.json)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "New posts found: $count"

      - name: Notify Slack
        if: steps.new_posts.outputs.count != '0'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          count=${{ steps.new_posts.outputs.count }}
          text=$(jq -r \
            '"새 블로그 글 \(length)건 🎉\n" + (map("• \(.member.nickname // .member.githubId)(\(.member.cohort // "?")기): <\(.url)|\(.title)>") | join("\n"))' \
            /tmp/blog-new-posts.json)

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg text "$text" '{"text": $text}')"

          echo "Slack notification sent: $count new posts"
