name: Continuous Sync

on:
  schedule:
    - cron: '0 * * * *' # 매시간
  workflow_dispatch: # 수동 트리거

jobs:
  continuous-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger continuous repo sync
        run: |
          BASE_URL="${{ secrets.SYNC_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://iftype.store"
          fi

          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE_URL/admin/sync/continuous" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}")

          echo "Response: $response"

          if [ "$response" != "200" ]; then
            echo "Continuous sync failed with status $response"
            exit 1
          fi
